services:
  - type: web
    name: portfolio-backend
    runtime: python
    rootDir: backend                  # point to backend/ folder in your repo
    buildCommand: pip install -r requirements.txt && python train.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    
    envVars:
      - key: GROQ_API_KEY
        sync: false                   # you'll paste this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false                   # your Vercel URL
      - key: CHROMA_PATH
        value: /opt/render/project/src/chroma_db
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2

    # Persistent disk so chroma_db survives redeploys
    disk:
      name: portfolio-storage
      mountPath: /opt/render/project/src
      sizeGB: 1                       # free tier allows 1 GB

    healthCheckPath: /health
